<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S·E·A — Calendrier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --tc: #B5522A; --tc-l: #d4724a; --tc-p: #f5e8e2;
  --gold: #c9a84c; --gold-l: #e8d5a3;
  --sky: #a8cdd8; --blush: #e8d4d0; --cream: #f7f3ee;
  --mint: #c8ddd6; --white: #fff;
  --td: #3a2a1e; --tm: #6b4c38; --ts: #9a7a68;
}
body {
  font-family:'Lato',sans-serif; font-weight:300;
  background: linear-gradient(160deg,#cde4ec 0%,#ddecd4 30%,#f0e8d8 60%,#e8d4d0 100%);
  min-height:100vh; color:var(--td);
}
.page { max-width:480px; margin:0 auto; padding:2rem 1.2rem 4rem; }

/* HEADER */
.header { text-align:center; margin-bottom:2rem; }
.logo { font-family:'Cormorant Garamond',serif; font-size:3.8rem; font-weight:300; color:var(--tc); letter-spacing:.15em; line-height:1; margin-bottom:.3rem; }
.logo-names { font-size:.72rem; letter-spacing:.3em; color:var(--tc); text-transform:uppercase; margin-bottom:1rem; }
.mandala { width:60px; height:60px; margin:0 auto .8rem; opacity:.7; }
.tagline { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.95rem; color:var(--tm); }

/* NAV */
.month-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.2rem; padding:.7rem 1rem; background:rgba(255,255,255,.5); border-radius:50px; backdrop-filter:blur(6px); border:1px solid rgba(181,82,42,.15); }
.nav-btn { background:none; border:none; cursor:pointer; color:var(--tc); font-size:1.2rem; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background .2s; }
.nav-btn:hover { background:rgba(181,82,42,.1); }
.month-label { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:600; color:var(--tc); letter-spacing:.06em; text-align:center; flex:1; }

/* LEGEND */
.legend { display:flex; gap:.8rem; justify-content:center; margin-bottom:1rem; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:.72rem; color:var(--tm); }
.legend-dot { width:10px; height:10px; border-radius:3px; }
.ld-immersion { background:rgba(168,205,216,.8); border:1px solid rgba(168,205,216,1); }
.ld-concert { background:rgba(201,168,76,.5); border:1px solid rgba(201,168,76,.8); }

/* GRILLE */
.cal-wrap { background:rgba(255,255,255,.48); border-radius:18px; border:1px solid rgba(181,82,42,.1); backdrop-filter:blur(8px); overflow:hidden; margin-bottom:1.5rem; }
.days-hdr { display:grid; grid-template-columns:repeat(7,1fr); background:rgba(181,82,42,.06); border-bottom:1px solid rgba(181,82,42,.09); }
.dname { text-align:center; padding:.6rem 0; font-size:.65rem; letter-spacing:.12em; text-transform:uppercase; color:var(--ts); }
.days-grid { display:grid; grid-template-columns:repeat(7,1fr); }
.day { min-height:52px; padding:.35rem .2rem; border-right:1px solid rgba(181,82,42,.06); border-bottom:1px solid rgba(181,82,42,.06); position:relative; transition:background .15s; }
.day:nth-child(7n) { border-right:none; }
.day.empty { background:rgba(255,255,255,.08); }
.day.other { opacity:.35; }
.day.has-evt { cursor:pointer; }
.day.has-evt:hover { background:rgba(181,82,42,.07); }
.day.today .dnum { background:var(--tc); color:#fff; border-radius:50%; }
.dnum { font-size:.8rem; font-weight:300; color:var(--td); width:24px; height:24px; display:flex; align-items:center; justify-content:center; margin:0 auto; }
.chips { display:flex; flex-direction:column; gap:2px; margin-top:3px; align-items:center; }
.chip { font-size:.48rem; text-align:center; padding:1px 3px; border-radius:3px; width:90%; }
.chip-immersion { background:rgba(168,205,216,.45); color:#2a6070; border:1px solid rgba(168,205,216,.7); }
.chip-concert { background:rgba(201,168,76,.3); color:#6b4a10; border:1px solid rgba(201,168,76,.5); }

/* UPCOMING */
.section-title { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.1rem; color:var(--tm); text-align:center; margin-bottom:1rem; letter-spacing:.05em; }
.upcoming-list { display:flex; flex-direction:column; gap:.7rem; margin-bottom:2rem; }
.ucard { background:rgba(255,255,255,.52); border:1px solid rgba(181,82,42,.12); border-radius:14px; padding:.9rem 1rem; display:flex; align-items:center; gap:.9rem; cursor:pointer; transition:background .2s,transform .15s; backdrop-filter:blur(4px); }
.ucard:hover { background:rgba(255,255,255,.72); transform:translateY(-2px); }
.udate-box { text-align:center; min-width:42px; }
.uday { font-family:'Cormorant Garamond',serif; font-size:1.9rem; font-weight:300; color:var(--tc); line-height:1; }
.umonth { font-size:.62rem; text-transform:uppercase; letter-spacing:.15em; color:var(--ts); }
.usep { width:1px; height:38px; background:rgba(181,82,42,.12); }
.uinfo { flex:1; }
.ulabel { font-size:.6rem; text-transform:uppercase; letter-spacing:.18em; margin-bottom:.15rem; }
.ulabel.immersion { color:#2a6070; }
.ulabel.concert { color:#6b4a10; }
.uname { font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--tc); }
.uwhere { font-size:.7rem; color:var(--ts); margin-top:2px; }
.uarrow { color:var(--tc); opacity:.4; }
.no-upcoming { text-align:center; font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--ts); font-size:.95rem; padding:1.5rem; }

/* OVERLAY */
.overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(42,26,14,.5); align-items:center; justify-content:center; padding:1.2rem; backdrop-filter:blur(3px); }
.overlay.open { display:flex; }
.ocard { background:linear-gradient(145deg,#f7f3ee,#edddd6); border-radius:20px; border:1px solid rgba(181,82,42,.18); max-width:360px; width:100%; position:relative; box-shadow:0 24px 64px rgba(42,26,14,.28); overflow:hidden; }
.oimg { width:100%; height:180px; object-fit:cover; display:block; }
.oimg-placeholder { width:100%; height:180px; background:linear-gradient(135deg,#cde4ec,#ddecd4,#f0e8d8); display:flex; align-items:center; justify-content:center; }
.oimg-placeholder svg { opacity:.35; }
.obody { padding:1.4rem 1.4rem 1.6rem; }
.oclose { position:absolute; top:.8rem; right:.9rem; background:rgba(247,243,238,.8); border:none; cursor:pointer; color:var(--tm); font-size:1.1rem; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; z-index:10; }
.otype { font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; margin-bottom:.4rem; }
.otype.immersion { color:#2a6070; }
.otype.concert { color:#6b4a10; }
.otitle { font-family:'Cormorant Garamond',serif; font-size:1.55rem; color:var(--tc); margin-bottom:.25rem; font-weight:400; }
.odate { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.95rem; color:var(--tm); margin-bottom:.9rem; }
.odivider { height:1px; background:rgba(181,82,42,.12); margin-bottom:.9rem; }
.oinfo { font-size:.82rem; color:var(--tm); line-height:1.8; margin-bottom:1.1rem; }
.oinfo span { display:block; margin-bottom:.25rem; }
.oinfo a { color:var(--tc); text-decoration:none; }
.oinfo a:hover { text-decoration:underline; }
.obtn { display:block; width:100%; padding:.85rem; background:var(--tc); color:#fff; border:none; border-radius:50px; font-family:'Lato',sans-serif; font-weight:300; font-size:.8rem; letter-spacing:.14em; text-transform:uppercase; cursor:pointer; text-align:center; text-decoration:none; transition:background .2s,transform .15s; }
.obtn:hover { background:var(--tc-l); transform:translateY(-1px); }
.obtn-disabled { background:rgba(181,82,42,.3); cursor:default; }
.obtn-disabled:hover { background:rgba(181,82,42,.3); transform:none; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo">S·E·A</div>
    <div class="logo-names">Samé &nbsp;·&nbsp; Émilie &nbsp;·&nbsp; Alicia</div>
    <svg class="mandala" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="30" stroke="#c9a84c" stroke-width=".7" opacity=".5"/>
      <circle cx="32" cy="32" r="22" stroke="#c9a84c" stroke-width=".5" opacity=".45"/>
      <circle cx="32" cy="32" r="14" stroke="#c9a84c" stroke-width=".5" opacity=".4"/>
      <circle cx="32" cy="20" r="8" stroke="#c9a84c" stroke-width=".5" opacity=".3"/>
      <circle cx="43" cy="26" r="8" stroke="#c9a84c" stroke-width=".5" opacity=".3"/>
      <circle cx="43" cy="38" r="8" stroke="#c9a84c" stroke-width=".5" opacity=".3"/>
      <circle cx="32" cy="44" r="8" stroke="#c9a84c" stroke-width=".5" opacity=".3"/>
      <circle cx="21" cy="38" r="8" stroke="#c9a84c" stroke-width=".5" opacity=".3"/>
      <circle cx="21" cy="26" r="8" stroke="#c9a84c" stroke-width=".5" opacity=".3"/>
      <line x1="32" y1="20" x2="43" y2="38" stroke="#c9a84c" stroke-width=".6" opacity=".45"/>
      <line x1="43" y1="38" x2="21" y2="38" stroke="#c9a84c" stroke-width=".6" opacity=".45"/>
      <line x1="21" y1="38" x2="32" y2="20" stroke="#c9a84c" stroke-width=".6" opacity=".45"/>
      <circle cx="32" cy="20" r="1.6" fill="#c9a84c" opacity=".65"/>
      <circle cx="43" cy="38" r="1.6" fill="#c9a84c" opacity=".65"/>
      <circle cx="21" cy="38" r="1.6" fill="#c9a84c" opacity=".65"/>
      <circle cx="32" cy="32" r="2.2" fill="#c9a84c" opacity=".75"/>
    </svg>
    <div class="tagline">Calendrier des prestations</div>
  </div>

  <div class="month-nav">
    <button class="nav-btn" id="prev">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="next">&#8594;</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot ld-immersion"></div><span>Immersion sonore</span></div>
    <div class="legend-item"><div class="legend-dot ld-concert"></div><span>Concert</span></div>
  </div>

  <div class="cal-wrap">
    <div class="days-hdr">
      <div class="dname">Lun</div><div class="dname">Mar</div><div class="dname">Mer</div>
      <div class="dname">Jeu</div><div class="dname">Ven</div><div class="dname">Sam</div><div class="dname">Dim</div>
    </div>
    <div class="days-grid" id="grid"></div>
  </div>

  <div class="section-title">Prochains rendez-vous</div>
  <div class="upcoming-list" id="upcomingList"></div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="ocard">
    <button class="oclose" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
    <div id="oImgWrap"></div>
    <div class="obody">
      <div class="otype" id="oType"></div>
      <div class="otitle" id="oTitle"></div>
      <div class="odate" id="oDate"></div>
      <div class="odivider"></div>
      <div class="oinfo" id="oInfo"></div>
      <a class="obtn" id="oBtn" href="#" target="_blank">Réserver ma place</a>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR = ['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
const STORAGE_KEY = 'sea_events_v2';

let now = new Date(), cy = now.getFullYear(), cm = now.getMonth();

function loadEvents() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || getDefaults(); }
  catch(e) { return getDefaults(); }
}

function getDefaults() {
  return [
    { id:1, title:"Immersion Sonore", date:"2025-04-26", timeStart:"1300", timeEnd:"1500", type:"immersion", place:"Om Chazen, La Possession", mapsLink:"https://maps.google.com/?q=Om+Chazen+La+Possession+Reunion", ticketLink:"https://www.billetweb.fr/", imageUrl:"" },
    { id:2, title:"Immersion Sonore", date:"2025-05-31", timeStart:"1300", timeEnd:"1500", type:"immersion", place:"Om Chazen, La Possession", mapsLink:"https://maps.google.com/?q=Om+Chazen+La+Possession+Reunion", ticketLink:"https://www.billetweb.fr/", imageUrl:"" },
    { id:3, title:"Immersion Sonore", date:"2025-07-05", timeStart:"1300", timeEnd:"1500", type:"immersion", place:"Om Chazen, La Possession", mapsLink:"https://maps.google.com/?q=Om+Chazen+La+Possession+Reunion", ticketLink:"https://www.billetweb.fr/", imageUrl:"" }
  ];
}

let events = loadEvents();

function formatTime(t) {
  if (!t || t.length < 3) return '';
  const s = t.padStart(4,'0');
  return s.slice(0,2) + 'h' + s.slice(2);
}

function formatDateFR(d) {
  const [y,m,day] = d.split('-');
  const dt = new Date(y, m-1, day);
  const dn = DAYS_FR[dt.getDay()===0?6:dt.getDay()-1];
  return `${dn} ${parseInt(day)} ${MONTHS[parseInt(m)-1]} ${y}`;
}

function getEvts(y, m, d) {
  const s = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return events.filter(e => e.date === s);
}

function render() {
  document.getElementById('monthLabel').textContent = `${MONTHS[cm]} ${cy}`;
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const first = new Date(cy, cm, 1);
  const last = new Date(cy, cm+1, 0);
  let dow = first.getDay(); if(dow===0) dow=7; dow--;
  const today = new Date();

  for(let i=0; i<dow; i++) {
    const pd = new Date(cy, cm, -dow+i+1);
    const c = document.createElement('div');
    c.className = 'day empty other';
    c.innerHTML = `<div class="dnum">${pd.getDate()}</div>`;
    grid.appendChild(c);
  }

  for(let d=1; d<=last.getDate(); d++) {
    const evts = getEvts(cy, cm, d);
    const isToday = today.getDate()===d && today.getMonth()===cm && today.getFullYear()===cy;
    const c = document.createElement('div');
    c.className = 'day'+(isToday?' today':'')+(evts.length?' has-evt':'');
    let chips = evts.map(e=>`<div class="chip chip-${e.type}">${e.type==='immersion'?'♪':'♬'}</div>`).join('');
    c.innerHTML = `<div class="dnum">${d}</div><div class="chips">${chips}</div>`;
    if(evts.length) c.addEventListener('click', ()=>showOverlay(evts[0]));
    grid.appendChild(c);
  }

  const total = dow + last.getDate();
  const rem = total%7===0?0:7-(total%7);
  for(let i=1; i<=rem; i++) {
    const c = document.createElement('div');
    c.className = 'day empty other';
    c.innerHTML = `<div class="dnum">${i}</div>`;
    grid.appendChild(c);
  }

  renderUpcoming();
}

function showOverlay(evt) {
  const imgWrap = document.getElementById('oImgWrap');
  // Use event image, or default image from settings, or SVG placeholder
  let imgUrl = evt.imageUrl || '';
  if(!imgUrl) {
    try {
      const def = JSON.parse(localStorage.getItem('sea_default_img_v2'));
      if(def && def.url) imgUrl = def.url;
    } catch(e) {}
  }
  if(imgUrl) {
    const img = document.createElement('img');
    img.className = 'oimg';
    img.src = imgUrl;
    img.alt = evt.title;
    img.onerror = function() {
      imgWrap.innerHTML = '';
      const ph = document.createElement('div');
      ph.className = 'oimg-placeholder';
      ph.innerHTML = svgPlaceholder();
      imgWrap.appendChild(ph);
    };
    imgWrap.innerHTML = '';
    imgWrap.appendChild(img);
  } else {
    imgWrap.innerHTML = `<div class="oimg-placeholder">${svgPlaceholder()}</div>`;
  }

  document.getElementById('oType').textContent = evt.type==='immersion'?'Immersion Sonore':'Concert';
  document.getElementById('oType').className = `otype ${evt.type}`;
  document.getElementById('oTitle').textContent = evt.title;
  document.getElementById('oDate').textContent = formatDateFR(evt.date);

  let info = '';
  if(evt.timeStart && evt.timeEnd) info += `<span>🕐 de ${formatTime(evt.timeStart)} à ${formatTime(evt.timeEnd)}</span>`;
  if(evt.place) {
    if(evt.mapsLink) info += `<span>📍 <a href="${evt.mapsLink}" target="_blank">${evt.place}</a></span>`;
    else info += `<span>📍 ${evt.place}</span>`;
  }
  document.getElementById('oInfo').innerHTML = info;

  const btn = document.getElementById('oBtn');
  const tUrl = evt.ticketUrl || evt.ticketLink || '';
  if(tUrl) { btn.href=tUrl; btn.className='obtn'; btn.textContent='Réserver ma place'; }
  else { btn.href='#'; btn.className='obtn obtn-disabled'; btn.textContent='Réservation bientôt disponible'; }

  document.getElementById('overlay').classList.add('open');
}

function svgPlaceholder() {
  return `<svg width="60" height="60" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="28" stroke="#c9a84c" stroke-width=".8"/><circle cx="32" cy="20" r="7" stroke="#c9a84c" stroke-width=".6"/><circle cx="42" cy="37" r="7" stroke="#c9a84c" stroke-width=".6"/><circle cx="22" cy="37" r="7" stroke="#c9a84c" stroke-width=".6"/><line x1="32" y1="20" x2="42" y2="37" stroke="#c9a84c" stroke-width=".6"/><line x1="42" y1="37" x2="22" y2="37" stroke="#c9a84c" stroke-width=".6"/><line x1="22" y1="37" x2="32" y2="20" stroke="#c9a84c" stroke-width=".6"/><circle cx="32" cy="32" r="2" fill="#c9a84c" opacity=".7"/></svg>`;
}

function closeOverlay(e) {
  if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open');
}

function renderUpcoming() {
  const list = document.getElementById('upcomingList');
  list.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  const up = events.filter(e=>new Date(e.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(0,5);
  if(!up.length) { list.innerHTML=`<div class="no-upcoming">Aucun événement à venir pour le moment…</div>`; return; }
  up.forEach(evt => {
    const [y,m,d] = evt.date.split('-');
    const card = document.createElement('div');
    card.className = 'ucard';
    card.innerHTML = `
      <div class="udate-box"><div class="uday">${parseInt(d)}</div><div class="umonth">${MONTHS[parseInt(m)-1].slice(0,3)}</div></div>
      <div class="usep"></div>
      <div class="uinfo">
        <div class="ulabel ${evt.type}">${evt.type==='immersion'?'Immersion Sonore':'Concert'}</div>
        <div class="uname">${evt.title}</div>
        ${evt.place?`<div class="uwhere">📍 ${evt.place}</div>`:''}
        ${evt.timeStart&&evt.timeEnd?`<div class="uwhere">🕐 de ${formatTime(evt.timeStart)} à ${formatTime(evt.timeEnd)}</div>`:''}
      </div>
      <div class="uarrow">→</div>`;
    card.addEventListener('click', ()=>showOverlay(evt));
    list.appendChild(card);
  });
}

document.getElementById('prev').addEventListener('click', ()=>{ cm--; if(cm<0){cm=11;cy--;} render(); });
document.getElementById('next').addEventListener('click', ()=>{ cm++; if(cm>11){cm=0;cy++;} render(); });

// sync storage changes from admin page
window.addEventListener('storage', e=>{ if(e.key===STORAGE_KEY){ events=loadEvents(); render(); }});

render();
</script>
</body>
</html>
